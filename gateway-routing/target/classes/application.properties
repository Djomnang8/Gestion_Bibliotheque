spring.application.name=gateway-routing
server.port=8080

# Eureka
spring.cloud.discovery.enabled=true
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
eureka.instance.prefer-ip-address=true

# Gateway – découverte automatique
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Route explicite pour service-livre (exemple)
spring.cloud.gateway.routes[0].id=service-livre
spring.cloud.gateway.routes[0].uri=lb://service-livre
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/livres/**

# Route pour service-emprunteur
spring.cloud.gateway.routes[1].id=service-emprunteur
spring.cloud.gateway.routes[1].uri=lb://service-emprunteur
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/emprunteurs/**

# Route pour service-emprunt
spring.cloud.gateway.routes[2].id=service-emprunt
spring.cloud.gateway.routes[2].uri=lb://service-emprunt
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/emprunts/**

# Filtre global ajoutant l'en-tête X-Gateway-Id
spring.cloud.gateway.default-filters[0]=AddResponseHeader=X-Gateway-Id, my-gateway